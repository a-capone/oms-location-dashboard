name: Refresh OMS dashboard

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oms-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare Google credentials
        shell: bash
        run: |
          printf '%s' "$GCP_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Download previous deployed dashboard
        shell: bash
        run: |
          mkdir -p runtime
          python - <<'PY'
          import os
          import urllib.request

          base_url = os.environ.get("DASHBOARD_PUBLIC_URL", "").strip()
          if not base_url:
              owner = os.environ["GITHUB_REPOSITORY_OWNER"]
              repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)[1]
              base_url = f"https://{owner}.github.io/{repo}"

          try:
              with urllib.request.urlopen(base_url.rstrip("/") + "/index.html", timeout=30) as response:
                  html = response.read()
          except Exception:
              raise SystemExit(0)

          with open("runtime/previous-index.html", "wb") as handle:
              handle.write(html)
          PY
        env:
          DASHBOARD_PUBLIC_URL: ${{ vars.DASHBOARD_PUBLIC_URL }}

      - name: Refresh mono-file dashboard
        run: python scripts/build_oms_location_dashboard.py --output tmp/index.html
        env:
          DASHBOARD_PREVIOUS_HTML: runtime/previous-index.html
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0048,TLITWH0048,TLITGX0048

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./tmp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
