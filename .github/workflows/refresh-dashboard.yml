name: Refresh OMS dashboard

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: oms-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare Google credentials
        shell: bash
        run: |
          printf '%s' "$GCP_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Build FE dashboard
        continue-on-error: false
        run: python scripts/build_oms_location_dashboard.py --brand FE
        env:
          DASHBOARD_PREVIOUS_HTML: ""
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0048,TLITWH0048,TLITGX0048

      - name: Build DG dashboard
        continue-on-error: true
        run: python scripts/build_oms_location_dashboard.py --brand DG
        env:
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0015,TLITWH0015,TLITGX0015

      - name: Build DJ dashboard
        continue-on-error: true
        run: python scripts/build_oms_location_dashboard.py --brand DJ
        env:
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0011,TLITWH0011,TLITGX0011

      - name: Build BB dashboard
        continue-on-error: true
        run: python scripts/build_oms_location_dashboard.py --brand BB
        env:
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0042,BBITST0001,TLITGX0042

      - name: Build WL dashboard
        continue-on-error: true
        run: python scripts/build_oms_location_dashboard.py --brand WL
        env:
          GEODIS_SFTP_HOST: stnetlglog.blob.core.windows.net
          GEODIS_SFTP_USER: stnetlglog.geodis
          GEODIS_SFTP_PORT: "22"
          GEODIS_SFTP_PASSWORD: ${{ secrets.GEODIS_SFTP_PASSWORD }}
          INVAPP_CLIENT_ID: ${{ secrets.INVAPP_CLIENT_ID }}
          INVAPP_CLIENT_SECRET: ${{ secrets.INVAPP_CLIENT_SECRET }}
          INVAPP_LOCATIONS: TLTEMP0012,TLITWH0012,TLITGX0012

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./tmp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
